name: Reproducibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reproducibility-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  synthetic-scenarios:
    name: Byte, hash, replay, and verdict stability
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python 3.12 with lock-bound cache
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install the reviewed development lock
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Install QuantForge without dependency resolution
        run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Run every synthetic scenario twice
        run: >-
          python -m scripts.verify_determinism
          --work-dir release/reproducibility
          --report release/determinism-validation.json
      - name: Upload only the non-sensitive validation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quantforge-ai-determinism-${{ github.sha }}
          path: release/determinism-validation.json
          if-no-files-found: error
          retention-days: 7
