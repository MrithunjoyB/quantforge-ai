name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain-and-inputs:
    name: Supply chain and malicious inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out full reachable history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.12 with lock-bound cache
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install the reviewed development lock
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Install QuantForge without dependency resolution
        run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Scan current files and reachable history for secrets
        run: python -m scripts.check_secrets
      - name: Audit exact runtime distributions
        run: python -m pip_audit -r requirements.lock --disable-pip --strict --progress-spinner off
      - name: Audit exact development distributions
        run: python -m pip_audit -r requirements-dev.lock --disable-pip --strict --progress-spinner off
      - name: Run malicious serialized-input regressions
        run: python -m pytest -m malicious
      - name: Validate publication and workflow policy
        run: python -m scripts.check_repository
      - name: Build distributions
        run: python -m build --no-isolation
      - name: Inspect distribution contents and archive integrity
        run: python -m scripts.inspect_packages --dist-dir dist
