name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Exact tag candidate, branch, or full commit to check out
        required: true
        type: string
      expected-sha:
        description: Required full 40-character commit SHA for the checked-out ref
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.expected-sha }}
  cancel-in-progress: false

jobs:
  exact-ref-candidate:
    name: Build and validate exact ref
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out requested ref without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify checked-out commit equals the full expected SHA
        env:
          EXPECTED_SHA: ${{ inputs.expected-sha }}
        run: python3 -c "import os,re,subprocess; expected=os.environ['EXPECTED_SHA']; actual=subprocess.check_output(['git','rev-parse','HEAD'], text=True).strip(); assert re.fullmatch('[0-9a-f]{40}', expected) and actual == expected, (actual, expected)"
      - name: Set up Python 3.12 with lock-bound cache
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install the reviewed development lock
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Install QuantForge without dependency resolution
        run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Build and validate the exact release candidate
        run: >-
          python -m scripts.release_candidate
          --baseline-commit 9888f6f64dfb814a9cc07bcdc8d2b4c366ebbe7e
          --output-dir release/v0.1.0
          --allow-recorded-engine-boundary
      - name: Upload non-sensitive candidate artifacts without publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quantforge-ai-v0.1.0-candidate-${{ inputs.expected-sha }}
          path: release/v0.1.0/
          if-no-files-found: error
          retention-days: 7
